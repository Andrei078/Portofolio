<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RYU — Contact</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/header.css" />
  <link rel="stylesheet" href="../css/contact.css" />
  <link rel="stylesheet" href="../css/footer.css" />
  <link rel="icon" href="../assets/img/favicon.jpg" />
</head>
<body>

  <canvas id="particle-canvas"></canvas>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">RYU<span class="logo-dot">.</span></a>
      <nav class="nav-links">
        <a href="../index.html" class="nav-link">Home</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="../index.html" class="mob-link">Home</a>
      <a href="contact.html" class="mob-link">Contact</a>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <section class="contact-section">
      <div class="hero-glow glow-purple"></div>
      <div class="hero-glow glow-cyan"></div>

      <div class="contact-wrapper">
        <div class="contact-header">
          <h1 class="contact-title">
            <span class="title-accent">//</span> Get In Touch
          </h1>
          <p class="contact-sub">
            Have a project in mind or just want to say hello?
            Drop a message and I'll get back to you.
          </p>
        </div>

        <!--
          ╔══════════════════════════════════════════════════════╗
          ║  TO SET YOUR EMAIL ADDRESS:                          ║
          ║  Open  js/contact.js  and change the line:          ║
          ║    const RECIPIENT_EMAIL = "your@email.com";         ║
          ╚══════════════════════════════════════════════════════╝
        -->
        <form class="contact-form" id="contact-form" novalidate>
          <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="form-input"
              placeholder="Your name"
              autocomplete="off"
              required
            />
            <span class="input-border"></span>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="your@email.com"
              autocomplete="off"
              required
            />
            <span class="input-border"></span>
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Message</label>
            <textarea
              id="message"
              name="message"
              class="form-input form-textarea"
              placeholder="Tell me about your project..."
              rows="6"
              required
            ></textarea>
            <span class="input-border"></span>
          </div>

          <button type="submit" class="btn-send" id="send-btn">
            <span class="btn-text">Send Message</span>
            <span class="btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </span>
            <span class="btn-loader" id="btn-loader"></span>
          </button>

          <p class="form-status" id="form-status"></p>
        </form>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-logo">RYU<span class="logo-dot">.</span></span>
        <p class="footer-sub">Building the future, one line at a time.</p>
      </div>
      <div class="footer-links">
        <a href="../index.html" class="footer-link">Home</a>
        <a href="contact.html" class="footer-link">Contact</a>
      </div>
      <div class="footer-right">
        <p class="footer-copy">&copy; <span id="year"></span> RYU. All rights reserved.</p>
      </div>
    </div>
    <div class="footer-bar"></div>
  </footer>

  <script src="../js/particles.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/contact.js"></script>
</body>
</html>
